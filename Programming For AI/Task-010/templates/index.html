<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot | Health Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Glassmorphism Container */
        .chat-container {
            width: 400px;
            height: 600px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Message Bubbles */
        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .bot-msg { background: rgba(255, 255, 255, 0.9); color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-msg { background: #4facfe; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 25px;
            color: white;
            outline: none;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.7); }

        button {
            background: #4facfe;
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #00f2fe; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">MediBot Center</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");

        // Initial Greeting
        window.onload = () => {
            appendMessage("MediBot", "Welcome! I'm here to help with appointments and doctor info. How can I assist you today?", "bot-msg");
        };

        function appendMessage(sender, text, className) {
            const div = document.createElement("div");
            div.className = `msg ${className}`;
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;

            appendMessage("You", text, "user-msg");
            input.value = "";

            const response = await fetch("/get_response", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            
            const data = await response.json();
            setTimeout(() => appendMessage("MediBot", data.reply, "bot-msg"), 500);
        }
    </script>
</body>
</html>
