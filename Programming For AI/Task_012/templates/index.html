<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot | Premium Assistant</title>
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: radial-gradient(circle at top left, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute; width: 300px; height: 300px;
            background: var(--secondary); filter: blur(80px);
            border-radius: 50%; z-index: -1; animation: move 10s infinite alternate;
        }

        @keyframes move { from { transform: translate(-50%, -50%); } to { transform: translate(50%, 50%); } }

        /* Glass Container */
        .chat-container {
            width: 420px; height: 650px;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 30px;
            display: flex; flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .header {
            padding: 25px; text-align: center; color: white;
            font-weight: 700; font-size: 1.2rem;
            border-bottom: 1px solid var(--border);
        }

        #chat-box {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* Sexy Bubbles */
        .msg {
            max-width: 85%; padding: 14px 18px; border-radius: 20px;
            font-size: 14px; line-height: 1.5; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bot { background: white; color: #1a2a6c; align-self: flex-start; border-bottom-left-radius: 5px; }
        .user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }

        @keyframes pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        /* Input Area */
        .input-group {
            padding: 25px; display: flex; gap: 12px;
            background: rgba(0,0,0,0.1); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }

        input {
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid var(--border);
            padding: 14px 20px; border-radius: 50px; color: white; outline: none;
            transition: 0.3s;
        }

        input:focus { background: rgba(255,255,255,0.2); border-color: var(--secondary); }

        button {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--primary); border: none; color: white;
            cursor: pointer; transition: 0.3s;
        }

        button:hover { transform: rotate(15deg) scale(1.1); background: var(--secondary); }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="chat-container">
        <div class="header">MediBot Intelligence</div>
        <div id="chat-box"></div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Ask about appointments...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");

        window.onload = () => {
            addMessage("MediBot", "Hello! I am your medical assistant. How can I help you with appointments or doctors today?", "bot");
        };

        function addMessage(sender, text, type) {
            const div = document.createElement("div");
            div.className = `msg ${type}`;
            div.innerHTML = `<strong>${sender}:</strong><br>${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const val = input.value.trim();
            if (!val) return;

            addMessage("You", val, "user");
            input.value = "";

            const res = await fetch("/get_response", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: val })
            });
            const data = await res.json();
            setTimeout(() => addMessage("MediBot", data.reply, "bot"), 600);
        }
    </script>
</body>
</html>
