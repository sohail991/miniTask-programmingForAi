<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Scraper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container text-center mt-5">
    <h1 class="animated-title">📧 Email Scraper</h1>

    <form method="POST" class="mt-4">
        <input type="url" name="url" class="form-control form-control-lg"
               placeholder="Enter website URL" required>
        <button class="btn btn-primary btn-lg mt-3">Scrape Emails</button>
    </form>

    {% if emails %}
    <div class="card mt-5 fade-in">
        <div class="card-body">
            <h4>Found {{ emails|length }} Emails</h4>
            <ul class="list-group mt-3">
                {% for email in emails %}
                <li class="list-group-item">{{ email }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
    {% endif %}
</div>

</body>
</html>
