<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahanzaib's NASA Space Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0d17; color: white; font-family: 'Segoe UI', sans-serif; }
        .nasa-card { background: #1a1d29; border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        .btn-nasa { background-color: #4cc9f0; color: #000; font-weight: bold; }
        img { border-radius: 10px; max-width: 100%; height: auto; }
        #mars-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .mars-img { width: 200px; height: 200px; object-fit: cover; border: 2px solid #4cc9f0; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-5">Jahanzaib's NASA Explorer</h1>

        <!-- Section 1: Astronomy Picture of the Day (Loaded via Flask) -->
        <div class="nasa-card">
            <h3 class="text-info">Astronomy Picture of the Day</h3>
            <h4>{{ apod.title }}</h4>
            <img src="{{ apod.url }}" alt="APOD" class="my-3">
            <p>{{ apod.explanation }}</p>
        </div>

        <!-- Section 2: Mars Rover (Dynamic Loading via JavaScript) -->
        <div class="nasa-card text-center">
            <h3 class="text-info text-start">Explore Mars</h3>
            <p class="text-start">Click the button below to fetch the latest photos from the Curiosity Rover dynamically.</p>
            <button class="btn btn-nasa mb-4" onclick="fetchMarsPhotos()">Load Mars Photos</button>
            
            <div id="loading" style="display:none;">Searching Mars...</div>
            <div id="mars-container">
                <!-- Mars photos will appear here without page reload -->
            </div>
        </div>
    </div>

    <script>
        async function fetchMarsPhotos() {
            const container = document.getElementById('mars-container');
            const loader = document.getElementById('loading');
            
            loader.style.display = 'block';
            container.innerHTML = ''; // Clear old photos

            try {
                // We call our OWN Flask backend API
                const response = await fetch('/get_mars_photos');
                const data = await response.json();
                
                loader.style.display = 'none';

                data.photos.slice(0, 8).forEach(photo => {
                    const img = document.createElement('img');
                    img.src = photo.img_src;
                    img.className = 'mars-img';
                    container.appendChild(img);
                });
            } catch (error) {
                console.error("Error fetching Mars data:", error);
                loader.innerText = "Failed to load Mars photos.";
            }
        }
    </script>
</body>
</html>
